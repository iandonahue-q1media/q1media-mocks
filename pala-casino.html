      {tactic:'cTV / OTT',visits:88600,visitors:30400,impressions:12200000,spend:860000,moV:7383,moU:2760,qtV:22150,qtU:6800},

  var fmt={
    n:function(v){return v.toLocaleString('en-US')},
    c:function(v){return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':String(v)},
    dc:function(v){return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v.toFixed(2)},
    pct:function(v){return v.toFixed(2)+'%'},
    d:function(v){return '$'+v.toFixed(2)},
    freq:function(v){return v.toFixed(1)+'x'}
  };

  var h=React.createElement;
  var RC=Recharts;

  function K(p){
    return h('div',{style:{background:brand.bgCard,border:'1px solid '+brand.border,borderRadius:12,padding:'16px 18px',minHeight:96,display:'flex',flexDirection:'column',justifyContent:'space-between'}},
      h('div',{style:{fontSize:11,fontWeight:500,color:brand.textSecondary,textTransform:'uppercase',letterSpacing:'0.06em'}},p.label),
      h('div',null,
        h('div',{style:{fontSize:26,fontWeight:600,color:p.accent?brand.magenta:brand.textPrimary,lineHeight:1.1}},p.value),
        p.sub&&h('div',{style:{fontSize:11,color:brand.textTertiary,marginTop:3}},p.sub)
      )
    );
  }

  function Card(p){
    return h('div',{style:{background:brand.bgCard,border:'1px solid '+brand.border,borderRadius:12,padding:18}},

  }

  function OriginsTable(p){
    var rows=p.rows,showCity=p.showCity;
    var max=Math.max.apply(null,rows.map(function(r){return r.share}));
    var th={padding:'8px',fontSize:11,color:brand.textSecondary,fontWeight:500,textTransform:'uppercase',letterSpacing:'0.05em',borderBottom:'1px solid '+brand.border,whiteSpace:'nowrap'};

    return h('table',{style:{width:'100%',borderCollapse:'collapse'}},
      h('thead',null,h('tr',null,
        h('th',{style:Object.assign({},th,{textAlign:'left'})},showCity?'City':'Distance'),

        h('th',{style:Object.assign({},th,{textAlign:'right'})},'Visits'),
        h('th',{style:Object.assign({},th,{textAlign:'right'})},'Unique Visitors'),
        h('th',{style:Object.assign({},th,{textAlign:'right',width:160})},'Share')
      )),
      h('tbody',null,rows.map(function(r,i){
        return h('tr',{key:i,style:{borderBottom:'1px solid '+brand.border}},
          h('td',{style:Object.assign({},td,{textAlign:'left',color:brand.textPrimary,fontWeight:500})},showCity?r.city:r.band),
          showCity&&h('td',{style:Object.assign({},td,{textAlign:'left',color:brand.textSecondary})},r.state),
          h('td',{style:Object.assign({},td,{textAlign:'right',color:brand.textPrimary})},fmt.n(r.visits)),
          h('td',{style:Object.assign({},td,{textAlign:'right',color:brand.textPrimary})},fmt.n(r.visitors)),
          h('td',{style:Object.assign({},td,{textAlign:'right'})},
            h('div',{style:{display:'flex',alignItems:'center',gap:8,justifyContent:'flex-end'}},
              h('span',{style:{fontSize:12,color:brand.textSecondary,minWidth:38}},r.share+'%'),
              h('div',{style:{width:80,height:5,background:brand.border,borderRadius:3}},
                h('div',{style:{width:((r.share/max)*100)+'%',height:5,background:brand.purple,borderRadius:3}})

      }))

  }

  function TabOverview(p){
    var d=p.d;
    return h('div',null,
      h(Heading,null,'Visitation impact'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:12}},
        h(K,{label:'Total visits',value:fmt.c(d.kpis.totalVisits),accent:true}),
        h(K,{label:'Unique visitors',value:fmt.c(d.kpis.uniqueVisitors)}),
        h(K,{label:'Repeat rate',value:d.kpis.repeatRate+'%'}),
        h(K,{label:'Cost per visit',value:fmt.d(d.kpis.cpv)}),
        h(K,{label:'Cost per visitor',value:fmt.d(d.kpis.cpuv)})
      ),
      h(Heading,null,'Visit frequency'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:12}},

        h(K,{label:'Clicks',value:fmt.c(d.kpis.clicks)}),
        h(K,{label:'CTR',value:fmt.pct(d.kpis.ctr)})
      ),
      h(Card,{title:'Weekly trends',subtitle:'Total visits and repeat visits by week'},

            h(RC.Line,{yAxisId:'r',type:'monotone',dataKey:'repeat',name:'Repeat visits',stroke:brand.magenta,strokeWidth:2.5,dot:{r:3,fill:brand.magenta}})

  function TabAudience(p){
    var d=p.d;
    return h('div',null,
      h(Heading,null,'Demographics'),
      h('div',{style:{display:'grid',gridTemplateColumns:'3fr 2fr',gap:12}},

        )
      )
    );
  }

  function TabOrigins(p){
    var d=p.d;

  function TabCompetitive(p){
    var d=p.d;
    var total=d.competitive.reduce(function(s,r){return s+r.visitors},0);
    var pie=d.competitive.map(function(r){return Object.assign({},r,{pct:((r.visitors/total)*100).toFixed(1)})});
    var compColors=[brand.magenta,brand.lightBlue,brand.purpleSecondary,'#4a8a6b','#6b6b8a'];
    var colors=pie.map(function(r,i){return r.isClient?brand.purple:compColors[i-1]||'#6b6b8a'});
    return h('div',null,
      h(Heading,null,'Competitive intelligence'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
        h(Card,{title:'Competitive intercept',subtitle:'Visitor share vs. competing tribal casinos',height:400},
          h('div',{style:{display:'flex',alignItems:'center',height:'100%'}},
            h('div',{style:{flex:1,height:340}},
              h(RC.ResponsiveContainer,{width:'100%',height:'100%'},
                h(RC.PieChart,null,
                  h(RC.Pie,{
                    data:pie,cx:'50%',cy:'50%',innerRadius:50,outerRadius:100,dataKey:'visitors',nameKey:'name',labelLine:false,
                    label:function(e){
                      var r=e.outerRadius+22,rad=Math.PI/180;
                      var x=e.cx+r*Math.cos(-e.midAngle*rad),y=e.cy+r*Math.sin(-e.midAngle*rad);
                      return h('text',{x:x,y:y,fill:brand.textPrimary,textAnchor:x>e.cx?'start':'end',dominantBaseline:'central',fontSize:10,fontWeight:500},e.pct+'%');
                    }
                  },
                    pie.map(function(_,i){return h(RC.Cell,{key:i,fill:colors[i],stroke:brand.bgPage,strokeWidth:2})})
                  )
                )
              )
            ),
            h('div',{style:{minWidth:155,paddingLeft:8}},
              pie.map(function(r,i){
                return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:8,marginBottom:10}},
                  h('div',{style:{width:10,height:10,borderRadius:2,background:colors[i],flexShrink:0}}),
                  h('div',null,
                    h('div',{style:{fontSize:11,color:brand.textPrimary,fontWeight:r.isClient?600:400}},r.name),
                    h('div',{style:{fontSize:10,color:brand.textTertiary}},fmt.c(r.visitors)+' \u00b7 '+r.pct+'%')
                  )
                );
              })
            )
          )
        ),
        h(Card,{title:'Cross-visitation',subtitle:'Players visiting competing properties',height:400},
          h('div',{style:{display:'flex',flexDirection:'column',gap:10,paddingTop:4}},
            d.crossVisit.map(function(cv,i){
              return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:8}},
                h('div',{style:{width:114,color:brand.textPrimary,fontSize:11,flexShrink:0}},cv.from),
                h('div',{style:{color:brand.textTertiary,fontSize:14,flexShrink:0}},'\u2192'),
                h('div',{style:{width:114,color:brand.textPrimary,fontSize:11,flexShrink:0}},cv.to),
                h('div',{style:{flex:1,height:20,background:brand.bgSurface,borderRadius:4,overflow:'hidden'}},
                  h('div',{style:{width:cv.pct+'%',height:20,background:'linear-gradient(90deg,'+brand.purple+','+brand.magenta+')',borderRadius:4}})
                ),
                h('div',{style:{width:34,textAlign:'right',color:brand.textPrimary,fontWeight:500,fontSize:12}},cv.pct+'%')
              );
            })
          )
        )
      )
    );
  }

  function TabCampaign(p){
    var d=p.d;
    var tacticCPV=d.tactics.map(function(r){return {tactic:r.tactic,cpv:parseFloat((r.spend/r.visits).toFixed(2))}});
    var tacticFreq=d.tactics.map(function(r){return {tactic:r.tactic,freq:parseFloat((r.visits/r.visitors).toFixed(1))}});
    var cols=[['Tactic','left',false],['Visits','right',false],['Visitors','right',false],['Impressions','right',false],['Spend','right',false],['CPV','right',true],['CPUV','right',true],['Mo. Freq','right',true],['Qtr. Freq','right',true],['Ann. Freq','right',true]];
    return h('div',null,
      h(Heading,null,'Performance by tactic'),
      h(Card,{title:'Tactic performance',subtitle:'Efficiency and frequency by media tactic',height:440},
        h('div',{style:{overflowX:'auto'}},
          h('table',{style:{width:'100%',fontSize:12,borderCollapse:'collapse',minWidth:820}},
            h('thead',null,h('tr',{style:{borderBottom:'1px solid '+brand.border}},
              cols.map(function(col){
                return h('th',{key:col[0],style:{padding:'8px 6px',fontSize:10,color:col[2]?brand.magenta:brand.textSecondary,fontWeight:500,textTransform:'uppercase',letterSpacing:'0.05em',textAlign:col[1],whiteSpace:'nowrap'}},col[0]);
              })
            )),
            h('tbody',null,d.tactics.map(function(r,i){
              var cpv=r.spend/r.visits,cpuv=r.spend/r.visitors;
              var moF=r.moV/r.moU,qtF=r.qtV/r.qtU,anF=r.visits/r.visitors;
              return h('tr',{key:i,style:{borderBottom:'1px solid '+brand.border}},
                h('td',{style:{padding:'10px 6px',color:brand.textPrimary,fontWeight:500}},r.tactic),
                h('td',{style:{padding:'10px 6px',textAlign:'right',color:brand.textPrimary}},fmt.n(r.visits)),
                h('td',{style:{padding:'10px 6px',textAlign:'right',color:brand.textPrimary}},fmt.n(r.visitors)),
                h('td',{style:{padding:'10px 6px',textAlign:'right',color:brand.textSecondary}},fmt.c(r.impressions)),
                h('td',{style:{padding:'10px 6px',textAlign:'right',color:brand.textSecondary}},fmt.dc(r.spend)),
                h('td',{style:{padding:'10px 6px',textAlign:'right',color:brand.magenta,fontWeight:600}},fmt.d(cpv)),
                h('td',{style:{padding:'10px 6px',textAlign:'right',color:brand.magenta,fontWeight:600}},fmt.d(cpuv)),
                h('td',{style:{padding:'10px 6px',textAlign:'right',color:brand.magenta,fontWeight:600}},fmt.freq(moF)),
                h('td',{style:{padding:'10px 6px',textAlign:'right',color:brand.magenta,fontWeight:600}},fmt.freq(qtF)),
                h('td',{style:{padding:'10px 6px',textAlign:'right',color:brand.magenta,fontWeight:600}},fmt.freq(anF))
              );
            }))
          )
        )
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:12}},
        h(Card,{title:'CPV by tactic',subtitle:'Cost per visit \u2014 lower is better',height:260},
          h(RC.ResponsiveContainer,{width:'100%',height:'100%'},
            h(RC.BarChart,{data:tacticCPV,margin:{top:5,right:20,left:0,bottom:0}},
              h(RC.CartesianGrid,{stroke:brand.border,strokeDasharray:'3 3',vertical:false}),
              h(RC.XAxis,{dataKey:'tactic',stroke:brand.textSecondary,fontSize:9}),
              h(RC.YAxis,{stroke:brand.textSecondary,fontSize:11,tickFormatter:function(v){return '$'+v}}),
              h(RC.Bar,{dataKey:'cpv',radius:[4,4,0,0]},
                d.tactics.map(function(_,i){return h(RC.Cell,{key:i,fill:cc[i%cc.length]})})
              )
            )
          )
        ),
        h(Card,{title:'Annual frequency by tactic',subtitle:'Avg annual visits per unique visitor',height:260},
          h(RC.ResponsiveContainer,{width:'100%',height:'100%'},
            h(RC.BarChart,{data:tacticFreq,margin:{top:5,right:20,left:0,bottom:0}},
              h(RC.CartesianGrid,{stroke:brand.border,strokeDasharray:'3 3',vertical:false}),
              h(RC.XAxis,{dataKey:'tactic',stroke:brand.textSecondary,fontSize:9}),
              h(RC.YAxis,{stroke:brand.textSecondary,fontSize:11,tickFormatter:function(v){return v+'x'}}),
              h(RC.Bar,{dataKey:'freq',radius:[4,4,0,0]},
                d.tactics.map(function(_,i){return h(RC.Cell,{key:i,fill:cc[i%cc.length]})})
              )
            )
          )
        )
      )
    );
  }

  var TABS=[
    {id:'overview',label:'Overview'},{id:'behavior',label:'Visitor Behavior'},
    {id:'audience',label:'Audience'},{id:'origins',label:'Origins'},
    {id:'competitive',label:'Competitive'},{id:'campaign',label:'Campaign Detail'}
  ];

  function App(){
    var state=React.useState('overview');
    var tab=state[0],setTab=state[1];
    var now=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    return h('div',{style:{background:brand.bgPage,minHeight:'100vh',padding:'24px 32px',color:brand.textPrimary}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',paddingBottom:20}},
        h('div',null,
          h('div',{style:{fontSize:12,color:brand.magenta,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase'}},'Q1Media Visitation Report'),
          h('div',{style:{fontSize:24,fontWeight:600,color:brand.textPrimary,marginTop:4}},data.clientName),
          h('div',{style:{fontSize:13,color:brand.textSecondary,marginTop:4}},data.reportingPeriod)
        ),
        h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
          h('span',{style:{fontSize:11,padding:'4px 10px',background:brand.bgTint,color:brand.magenta,border:'1px solid '+brand.magenta,borderRadius:20,fontWeight:500}},'Sample Data \u2014 For Illustration Only'),
          h('button',{className:'no-print',onClick:function(){window.print()},style:{fontSize:12,padding:'7px 14px',background:brand.magenta,color:'#fff',border:'none',borderRadius:8,fontWeight:500}},'Export Report')
        )
      ),
      h('div',{className:'no-print',style:{display:'flex',borderBottom:'1px solid '+brand.border,marginBottom:20}},
        TABS.map(function(t){
          return h('button',{key:t.id,onClick:function(){setTab(t.id)},style:{
            padding:'12px 20px',fontSize:13,fontWeight:500,background:'transparent',border:'none',
            borderBottom:tab===t.id?'3px solid '+brand.magenta:'3px solid transparent',
            color:tab===t.id?brand.lightBlue:brand.textSecondary
          }},t.label);
        })
      ),
      tab==='overview'&&h(TabOverview,{d:data}),
      tab==='behavior'&&h(TabBehavior,{d:data}),
      tab==='audience'&&h(TabAudience,{d:data}),
      tab==='origins'&&h(TabOrigins,{d:data}),
      tab==='competitive'&&h(TabCompetitive,{d:data}),
      tab==='campaign'&&h(TabCampaign,{d:data}),
      h('div',{style:{marginTop:32,paddingTop:20,borderTop:'1px solid '+brand.border,display:'flex',justifyContent:'space-between',fontSize:11,color:brand.textTertiary}},
        h('div',null,'Powered by Q1Media location intelligence'),
        h('div',null,'Generated '+now)
      )
    );
  }

  window.addEventListener('load',function(){
    ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
  });
})();
</script>
</body>
</html>
